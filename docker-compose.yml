services:
  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: weather
      POSTGRES_PASSWORD: weather
      POSTGRES_DB: weather
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U weather"]
      interval: 5s
      timeout: 5s
      retries: 5

  db-migrate:
    image: migrate/migrate
    volumes:
      - ./db/migrations:/migrations
    command:
      - "-path=/migrations"
      - "-database=postgres://weather:weather@postgres:5432/weather?sslmode=disable"
      - "up"
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  subscriber-logger:
    build: ./subscriber-logger
    environment:
      - MQTT_BROKER=tcp://mosquitto:1883
    depends_on:
      - mosquitto
    restart: on-failure

  subscriber-db:
    build: ./subscriber-db
    environment:
      - MQTT_BROKER=tcp://mosquitto:1883
      - DATABASE_URL=postgres://weather:weather@postgres:5432/weather?sslmode=disable
    depends_on:
      mosquitto:
        condition: service_started
      db-migrate:
        condition: service_completed_successfully
    restart: on-failure

volumes:
  postgres-data:
